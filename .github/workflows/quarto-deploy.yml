on:
  push:
    branches: main

name: Render and Deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Create .env file
        run: echo "YOUTUBE_URL=${{ secrets.YOUTUBE_URL }}" > .env

      - name: Render website
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/deploy@v2
        with:
          target: gh-pages